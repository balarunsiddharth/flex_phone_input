name: flex_phone_input
description: "A searchable phone number input field with a country code picker. Supports multiple field styles, selector surfaces, validation states, and full light/dark theming."
version: 1.0.1

repository: https://github.com/balarunsiddharth/flex_phone_input
homepage: https://github.com/balarunsiddharth/flex_phone_input
issue_tracker: https://github.com/balarunsiddharth/flex_phone_input/issues

topics:
  - phone
  - country
  - input
  - picker
  - form

# Screenshots shown on the pub.dev package page. The first is the thumbnail.
screenshots:
  - description: "Ten field styles with an integrated country selector (light theme)."
    path: screenshots/01_field_styles_light.png
  - description: "The same field styles rendered in dark theme."
    path: screenshots/02_field_styles_dark.png
  - description: "Searchable country selector with pinned popular countries."
    path: screenshots/03_country_picker.png
  - description: "Live search filters countries by name or dial code."
    path: screenshots/04_search.png
  - description: "Inline dropdown selector anchored beneath the field."
    path: screenshots/05_inline_dropdown.png
  - description: "Validation states: a verified number and an error."
    path: screenshots/06_validation.png
  - description: "Flag-only and flag-chip field variants."
    path: screenshots/07_flag_variants.png

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  # flutter_lints 6.x is available but requires Dart >=3.8.
  flutter_lints: ^5.0.0
